changelog:
  categories:
    - title: Features
      labels:
        - enhancement
        - feature
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Maintenance
      labels:
        - chore
        - refactor
        - dependencies
    - title: Breaking Changes
      labels:
        - breaking-change
  include:
    - title: New Contributors
      labels:
        - new-contributor
